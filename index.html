<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Phoenix ISR – Site PRO</title>

  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --line:#e2e8f0;
      --soft:#f1f5f9;
      --primary:#1e3a8a;
      --accent:#2563eb;
      --accent2:#0ea5e9;
      --ok:#16a34a;
      --warn:#f59e0b;
      --bad:#dc2626;
      --radius:14px;
      --shadow: 0 14px 34px rgba(15,23,42,.08);
      --focus: 0 0 0 4px rgba(37,99,235,.18);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg), #eef2ff);
      color:var(--text);
    }
    .container{ width:min(1200px, 94vw); margin:0 auto; padding:26px 0 70px; }

    /* gate */
    .gate{
      position:fixed; inset:0; z-index:9999;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display:flex; align-items:center; justify-content:center; padding:18px;
    }
    .gate-card{
      width:min(420px, 96vw);
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 16px;
      box-shadow: 0 25px 55px rgba(0,0,0,.35);
      padding: 28px 22px;
      color:#fff;
      backdrop-filter: blur(10px);
      text-align:center;
    }
    .gate-input{
      width:100%;
      padding:12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.25);
      outline:none;
      background: rgba(0,0,0,.25);
      color:#fff;
      font-size:14px;
    }
    .gate-row{ display:flex; gap:10px; margin-top:12px; }
    .gate-btn{
      flex:1;
      padding:12px 14px;
      border-radius: 12px;
      border: 0;
      cursor:pointer;
      font-weight:800;
      color:#fff;
      background: #ff6b00;
      transition:.18s ease;
    }
    .gate-btn.secondary{
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.20);
    }
    .gate-error{ margin:12px 0 0; color:#ffb4b4; font-size:13px; min-height:18px; }

    header{
      background: rgba(255,255,255,.92);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:18px 18px;
      margin-bottom:14px;
    }
    .callout{
      border:1px solid rgba(14,165,233,.25);
      background: rgba(14,165,233,.06);
      border-radius:12px;
      padding:12px;
      font-size:13px;
      line-height:1.6;
      margin-top: 12px;
    }
    .callout.ok{ border-color: rgba(22,163,74,.25); background: rgba(22,163,74,.08); }
    .callout.warn{ border-color: rgba(245,158,11,.25); background: rgba(245,158,11,.10); }
    .callout.bad{ border-color: rgba(220,38,38,.25); background: rgba(220,38,38,.08); }

    .doc-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 10px;
      border-radius:10px;
      border:1px solid rgba(37,99,235,.25);
      background:rgba(37,99,235,.06);
      color:var(--accent);
      text-decoration:none;
      font-size:12px;
      font-weight:800;
      margin-right:8px;
      transition: .18s ease;
      cursor:pointer;
    }

    .table-wrap{ border:1px solid var(--line); border-radius:12px; overflow:hidden; background:#fff; margin-top:12px; }
    table{ width:100%; border-collapse:collapse; font-size:13px; }
    th, td{ padding:12px; border-bottom:1px solid var(--line); vertical-align:top; }
    th{ background:#f8fafc; font-weight:750; }
    tr:last-child td{ border-bottom:0; }

    #protectedSite{ display:none; }
  </style>
</head>

<body>

  <!-- GATE -->
  <div class="gate" id="gate" aria-hidden="false">
    <div class="gate-card">
      <h2 style="margin:0 0 8px; font-size:18px; font-weight:800;">🔐 Accès sécurisé</h2>
      <p style="margin:0 0 18px; font-size:13px; opacity:.9;">Mot de passe géré côté serveur (Cloudflare Variables).</p>

      <input class="gate-input" id="gatePassword" type="password" placeholder="Mot de passe" autocomplete="current-password" />
      <div class="gate-row">
        <button class="gate-btn" id="gateEnter" type="button">Entrer</button>
        <button class="gate-btn secondary" id="gateClear" type="button">Effacer</button>
      </div>
      <p class="gate-error" id="gateError"></p>
    </div>
  </div>

  <!-- SITE -->
  <div id="protectedSite" aria-hidden="true">
    <div class="container">

      <header>
        <h1 data-key="header_title">Phoenix ISR (Nigeria) — Cadre réglementaire & sécurité des données</h1>
        <p data-key="header_desc" style="color:var(--muted); line-height:1.55;">
          Contenu modifiable par ADMIN (KV). Upload docs sécurisé (R2).
        </p>
      </header>

      <section>
        <h2>📄 Documents (R2)</h2>

        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
          <input id="docTitle" type="text" placeholder="Titre (optionnel)"
            style="padding:10px; border-radius:12px; border:1px solid var(--line); min-width:240px;" />

          <label class="doc-link" style="cursor:pointer;">
            Sélectionner fichiers
            <input id="fileInput" type="file" multiple style="display:none" />
          </label>

          <button class="gate-btn" id="uploadBtn" type="button" style="max-width:220px;">Uploader</button>
          <button class="gate-btn secondary" id="refreshDocsBtn" type="button" style="max-width:220px;">Rafraîchir</button>
        </div>

        <div id="uploadStatus" class="callout" style="display:none;"></div>

        <div class="table-wrap">
          <table>
            <thead><tr><th>Document</th><th>Type</th><th>Accès</th></tr></thead>
            <tbody id="docsTbody"><tr><td colspan="3" style="color:var(--muted);">Chargement…</td></tr></tbody>
          </table>
        </div>
      </section>

    </div>
  </div>

  <script>
    const PhoenixApp = {
      config: {
        sessionKey: "phoenix_auth",
        tokenKey: "phoenix_token",
        roleKey: "phoenix_role",
        lockShortcut: { ctrl: true, key: "L" }
      }
    };

    /* ==========================
       ACCESS GATE (API login)
       ========================== */
    (function initGate(){
      const { sessionKey, tokenKey, roleKey, lockShortcut } = PhoenixApp.config;

      const gate = document.getElementById("gate");
      const site = document.getElementById("protectedSite");
      const input = document.getElementById("gatePassword");
      const enterBtn = document.getElementById("gateEnter");
      const clearBtn = document.getElementById("gateClear");
      const err = document.getElementById("gateError");

      function showSite(){
        gate.style.display = "none";
        gate.setAttribute("aria-hidden","true");
        site.style.display = "block";
        site.setAttribute("aria-hidden","false");
      }

      function lockSite(){
        sessionStorage.removeItem(sessionKey);
        sessionStorage.removeItem(tokenKey);
        sessionStorage.removeItem(roleKey);

        gate.style.display = "flex";
        gate.setAttribute("aria-hidden","false");
        site.style.display = "none";
        site.setAttribute("aria-hidden","true");
        input.value = "";
        err.textContent = "";
        setTimeout(() => input.focus(), 50);

        // IMPORTANT: prévenir les autres modules
        window.dispatchEvent(new Event("phoenix-auth-changed"));
      }

      async function tryLogin(){
        const v = (input.value || "").trim();
        if(!v){ err.textContent = "Veuillez entrer un mot de passe."; return; }

        err.textContent = "Connexion…";

        try{
          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type":"application/json" },
            body: JSON.stringify({ password: v })
          });

          const data = await res.json().catch(()=>null);
          if(!res.ok || !data?.ok || !data?.token){
            err.textContent = "Mot de passe incorrect.";
            return;
          }

          sessionStorage.setItem(sessionKey, "1");
          sessionStorage.setItem(tokenKey, data.token);
          sessionStorage.setItem(roleKey, data.role || "viewer");

          // FIX IMPORTANT: prévenir UI (docs + toolbar)
          window.dispatchEvent(new Event("phoenix-auth-changed"));

          showSite();
          err.textContent = "";
        }catch(e){
          err.textContent = "Erreur réseau / API.";
        }
      }

      clearBtn.addEventListener("click", () => { input.value=""; err.textContent=""; input.focus(); });
      enterBtn.addEventListener("click", tryLogin);
      input.addEventListener("keydown", (e) => { if(e.key === "Enter") tryLogin(); });

      if(sessionStorage.getItem(sessionKey) === "1" && sessionStorage.getItem(tokenKey)) showSite();
      else lockSite();

      document.addEventListener("keydown", (e) => {
        const okCtrl = !!lockShortcut.ctrl === e.ctrlKey;
        const okKey = (e.key || "").toUpperCase() === (lockShortcut.key || "").toUpperCase();
        if(okCtrl && okKey){ e.preventDefault(); lockSite(); }
      });
    })();

    /* ==========================
       DOCS (list/upload/download)
       ========================== */
    (function initDocs(){
      const els = {
        fileInput: document.getElementById("fileInput"),
        uploadBtn: document.getElementById("uploadBtn"),
        refreshBtn: document.getElementById("refreshDocsBtn"),
        docTitle: document.getElementById("docTitle"),
        status: document.getElementById("uploadStatus"),
        tbody: document.getElementById("docsTbody")
      };
      if(!els.tbody) return;

      const API = {
        list: "/api/docs",
        upload: "/api/upload",
        download: (id) => `/api/docs/${encodeURIComponent(id)}/download`
      };

      const getToken = () => sessionStorage.getItem(PhoenixApp.config.tokenKey) || "";
      const getRole  = () => sessionStorage.getItem(PhoenixApp.config.roleKey) || "viewer";

      function escapeHtml(s){
        return String(s).replace(/[&<>"']/g, (m)=>({
          "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
        }[m]));
      }

      function showStatus(kind, html){
        els.status.style.display = "block";
        els.status.className = `callout ${kind||""}`.trim();
        els.status.innerHTML = html;
      }

      function applyRoleUI(){
        const isAdmin = getRole() === "admin";
        els.uploadBtn.style.display = isAdmin ? "inline-block" : "none";
        els.fileInput.disabled = !isAdmin;
        els.docTitle.style.display = isAdmin ? "inline-block" : "none";
      }
      applyRoleUI();
      window.addEventListener("phoenix-auth-changed", applyRoleUI);

      async function safeText(res){
        try{ return (await res.text()).slice(0, 300); }
        catch{ return "—"; }
      }

      async function refreshDocs(){
        const token = getToken();
        if(!token){
          els.tbody.innerHTML = `<tr><td colspan="3" style="color:var(--muted);">Non connecté.</td></tr>`;
          return;
        }

        const res = await fetch(API.list, { headers: { "Authorization": `Bearer ${token}` } });
        if(!res.ok){
          const msg = await safeText(res);
          els.tbody.innerHTML = `<tr><td colspan="3" style="color:var(--muted);">Erreur: ${escapeHtml(msg)}</td></tr>`;
          return;
        }

        const docs = await res.json().catch(()=>[]);
        els.tbody.innerHTML = (docs||[]).map(d => `
          <tr>
            <td>${escapeHtml(d.title || d.originalName || "Document")}</td>
            <td>${escapeHtml(d.type || "—")}</td>
            <td>
              <button class="doc-link" data-open="${escapeHtml(d.id)}" type="button">Ouvrir</button>
              <button class="doc-link" data-dl="${escapeHtml(d.id)}" type="button">Télécharger</button>
            </td>
          </tr>
        `).join("") || `<tr><td colspan="3" style="color:var(--muted);">Aucun document.</td></tr>`;

        els.tbody.querySelectorAll("button[data-open]").forEach(btn=>{
          btn.addEventListener("click", ()=>downloadDoc(btn.getAttribute("data-open"), true));
        });
        els.tbody.querySelectorAll("button[data-dl]").forEach(btn=>{
          btn.addEventListener("click", ()=>downloadDoc(btn.getAttribute("data-dl"), false));
        });
      }

      async function downloadDoc(id, openInNewTab){
        const token = getToken();
        if(!token){ showStatus("bad","Token manquant. Reconnecte-toi."); return; }

        const res = await fetch(API.download(id), { headers: { "Authorization": `Bearer ${token}` } });
        if(!res.ok){
          const msg = await safeText(res);
          showStatus("bad", `<strong>Erreur download:</strong> ${escapeHtml(msg)}`);
          return;
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);

        if(openInNewTab){
          window.open(url, "_blank", "noopener");
        }else{
          const a = document.createElement("a");
          a.href = url;
          a.download = "";
          document.body.appendChild(a);
          a.click();
          a.remove();
        }
        setTimeout(()=>URL.revokeObjectURL(url), 15000);
      }

      async function uploadFiles(){
        if(getRole() !== "admin"){
          showStatus("warn", "Upload réservé à l’admin.");
          return;
        }

        const token = getToken();
        if(!token){ showStatus("bad", "Token manquant. Reconnecte-toi."); return; }

        const files = Array.from(els.fileInput.files || []);
        if(!files.length){ showStatus("warn","Aucun fichier sélectionné."); return; }

        els.uploadBtn.disabled = true;
        showStatus("", "Upload en cours…");

        try{
          for(const f of files){
            const form = new FormData();
            form.append("file", f);
            form.append("originalName", f.name);
            form.append("title", (els.docTitle.value || "").trim());

            const res = await fetch(API.upload, {
              method: "POST",
              headers: { "Authorization": `Bearer ${token}` },
              body: form
            });

            if(!res.ok){
              const msg = await safeText(res);
              throw new Error(`Upload échoué (${res.status}) : ${msg}`);
            }
          }

          showStatus("ok", "✅ Upload OK");
          els.fileInput.value = "";
          await refreshDocs();
        }catch(e){
          showStatus("bad", `<strong>Erreur :</strong> ${escapeHtml(e.message || String(e))}`);
        }finally{
          els.uploadBtn.disabled = false;
        }
      }

      els.refreshBtn.addEventListener("click", refreshDocs);
      els.uploadBtn.addEventListener("click", uploadFiles);

      window.addEventListener("phoenix-auth-changed", refreshDocs);
      refreshDocs();
    })();

    /* ==========================
       EDIT CONTENT (ADMIN only)
       ========================== */
    (function initEditableContent(){
      const getToken = () => sessionStorage.getItem(PhoenixApp.config.tokenKey) || "";
      const getRole  = () => sessionStorage.getItem(PhoenixApp.config.roleKey) || "viewer";

      const toolbar = document.createElement("div");
      toolbar.style.position = "fixed";
      toolbar.style.bottom = "14px";
      toolbar.style.right = "14px";
      toolbar.style.zIndex = "9999";
      toolbar.style.display = "none";
      toolbar.style.gap = "10px";

      toolbar.innerHTML = `
        <button id="editToggle" class="gate-btn secondary" style="max-width:220px; padding:10px 12px;">Mode édition</button>
        <button id="saveContent" class="gate-btn" style="max-width:220px; padding:10px 12px;">Sauvegarder</button>
      `;
      document.body.appendChild(toolbar);

      const btnEdit = toolbar.querySelector("#editToggle");
      const btnSave = toolbar.querySelector("#saveContent");

      function applyRoleUI(){
        toolbar.style.display = (getRole() === "admin") ? "flex" : "none";
      }
      applyRoleUI();
      window.addEventListener("phoenix-auth-changed", applyRoleUI);

      let editMode = false;

      function setEditable(on){
        document.querySelectorAll("[data-key]").forEach(el => {
          el.setAttribute("contenteditable", on ? "true" : "false");
          el.style.outline = on ? "2px dashed rgba(37,99,235,.55)" : "none";
          el.style.outlineOffset = on ? "4px" : "0";
        });
      }

      async function loadContent(){
        const token = getToken();
        if(!token) return;

        try{
          const res = await fetch("/api/content", {
            headers: { "Authorization": `Bearer ${token}` }
          });
          if(!res.ok) return;

          const data = await res.json();
          const sections = data?.data?.sections || {};

          document.querySelectorAll("[data-key]").forEach(el => {
            const key = el.getAttribute("data-key");
            if(sections[key] != null) el.innerHTML = sections[key];
          });
        }catch{}
      }

      window.addEventListener("phoenix-auth-changed", loadContent);
      loadContent();

      btnEdit.addEventListener("click", () => {
        editMode = !editMode;
        setEditable(editMode);
        btnEdit.textContent = editMode ? "Quitter édition" : "Mode édition";
      });

      btnSave.addEventListener("click", async () => {
        const token = getToken();
        if(!token) return;

        const sections = {};
        document.querySelectorAll("[data-key]").forEach(el => {
          const key = el.getAttribute("data-key");
          sections[key] = el.innerHTML;
        });

        try{
          const res = await fetch("/api/content", {
            method: "PUT",
            headers: {
              "Content-Type":"application/json",
              "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({ sections })
          });

          if(!res.ok){
            alert("Erreur sauvegarde (permission admin ?)");
            return;
          }

          alert("✅ Contenu sauvegardé !");
          editMode = false;
          setEditable(false);
          btnEdit.textContent = "Mode édition";
        }catch{
          alert("Erreur réseau.");
        }
      });
    })();
  </script>
</body>
</html>
